name: 📁 Backup Files to Repository (NO SERVER)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [backup_trigger, quick_backup_trigger]
  schedule:
    # Backup daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Restore server cache
      uses: actions/cache@v4
      with:
        path: |
          minecraft-data
          craftip-logs
        key: mc-server-${{ github.run_id }}
        restore-keys: |
          mc-server-
          
    - name: Create backup directories
      run: |
        mkdir -p server-backups/worlds
        mkdir -p server-backups/configs
        mkdir -p server-backups/playerdata
        mkdir -p server-backups/plugins
        mkdir -p server-backups/logs
        
    - name: Check backup type
      id: backup_type
      run: |
        if [ "${{ github.event.client_payload.type }}" = "quick_backup" ]; then
          echo "type=quick" >> $GITHUB_OUTPUT
        else
          echo "type=full" >> $GITHUB_OUTPUT
        fi
        
    - name: Quick backup (every 50 minutes)
      if: steps.backup_type.outputs.type == 'quick'
      run: |
        echo "Performing quick backup..."
        # Find and backup the latest quick backup
        LATEST_QUICK=$(find minecraft-data/backups -name "quick-*" -type d | sort -r | head -1)
        if [ -n "$LATEST_QUICK" ]; then
          echo "Found quick backup: $LATEST_QUICK"
          
          # Copy quick backup to repository
          cp -r "$LATEST_QUICK" server-backups/quick-backups/
          
          # Commit quick backup
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add server-backups/quick-backups/
          git diff --staged --quiet || git commit -m "⚡ Quick backup - $(date +%Y-%m-%d %H:%M)"
          git push
          
          echo "Quick backup committed to repository"
        else
          echo "No quick backup found"
        fi
        
    - name: Backup world data
      if: steps.backup_type.outputs.type == 'full'
      run: |
        echo "Backing up world data..."
        if [ -d "minecraft-data/world" ]; then
          # Create compressed world backup
          tar -czf "server-backups/worlds/world-$(date +%Y%m%d).tar.gz" -C minecraft-data world/
          echo "World backup created: world-$(date +%Y%m%d).tar.gz"
        fi
        
        if [ -d "minecraft-data/world_nether" ]; then
          tar -czf "server-backups/worlds/world_nether-$(date +%Y%m%d).tar.gz" -C minecraft-data world_nether/
        fi
        
        if [ -d "minecraft-data/world_the_end" ]; then
          tar -czf "server-backups/worlds/world_the_end-$(date +%Y%m%d).tar.gz" -C minecraft-data world_the_end/
        fi
        
    - name: Backup server configurations
      run: |
        echo "Backing up server configurations..."
        # Copy essential config files
        cp minecraft-data/server.properties server-backups/configs/ 2>/dev/null || true
        cp minecraft-data/eula.txt server-backups/configs/ 2>/dev/null || true
        cp minecraft-data/ops.json server-backups/configs/ 2>/dev/null || true
        cp minecraft-data/whitelist.json server-backups/configs/ 2>/dev/null || true
        cp minecraft-data/banned-players.json server-backups/configs/ 2>/dev/null || true
        cp minecraft-data/banned-ips.json server-backups/configs/ 2>/dev/null || true
        
    - name: Backup player data
      run: |
        echo "Backing up player data..."
        if [ -d "minecraft-data/playerdata" ]; then
          tar -czf "server-backups/playerdata/playerdata-$(date +%Y%m%d).tar.gz" -C minecraft-data playerdata/
        fi
        
        if [ -d "minecraft-data/stats" ]; then
          tar -czf "server-backups/playerdata/stats-$(date +%Y%m%d).tar.gz" -C minecraft-data stats/
        fi
        
        if [ -d "minecraft-data/advancements" ]; then
          tar -czf "server-backups/playerdata/advancements-$(date +%Y%m%d).tar.gz" -C minecraft-data advancements/
        fi
        
    - name: Backup plugins and configs
      run: |
        echo "Backing up plugins..."
        if [ -d "minecraft-data/plugins" ]; then
          # Backup plugin JARs
          cp minecraft-data/plugins/*.jar server-backups/plugins/ 2>/dev/null || true
          
          # Backup plugin configurations
          tar -czf "server-backups/plugins/plugin-configs-$(date +%Y%m%d).tar.gz" -C minecraft-data/plugins/ --exclude="*.jar" .
        fi
        
    - name: Backup recent logs
      run: |
        echo "Backing up recent logs..."
        if [ -d "minecraft-data/logs" ]; then
          # Only backup recent logs to save space
          find minecraft-data/logs -name "*.log" -mtime -7 -exec cp {} server-backups/logs/ \;
        fi
        
    - name: Create backup manifest
      run: |
        echo "Creating backup manifest..."
        cat > server-backups/BACKUP_MANIFEST_$(date +%Y%m%d).md << EOF
        # Server Backup Manifest
        
        **Date:** $(date)
        **Workflow Run:** ${{ github.run_id }}
        
        ## Backup Contents
        
        ### Worlds
        - world-$(date +%Y%m%d).tar.gz - Main world data
        - world_nether-$(date +%Y%m%d).tar.gz - Nether dimension
        - world_the_end-$(date +%Y%m%d).tar.gz - End dimension
        
        ### Configurations
        - server.properties - Server settings
        - eula.txt - License agreement
        - ops.json - Server operators
        - whitelist.json - Player whitelist
        - banned-players.json - Banned players
        - banned-ips.json - Banned IPs
        
        ### Player Data
        - playerdata-$(date +%Y%m%d).tar.gz - Player inventories and data
        - stats-$(date +%Y%m%d).tar.gz - Player statistics
        - advancements-$(date +%Y%m%d).tar.gz - Player achievements
        
        ### Plugins
        - *.jar files - Plugin binaries
        - plugin-configs-$(date +%Y%m%d).tar.gz - Plugin configurations
        
        ### Logs
        - Recent server logs (last 7 days)
        
        ## Restoration Instructions
        
        To restore from this backup:
        1. Download the backup files from this repository
        2. Extract the tar.gz files to appropriate directories
        3. Place config files in server root
        4. Restart the server
        
        **Note:** This backup complements the GitHub Actions cache system.
        EOF
        
    - name: Commit and push backup
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add all backup files
        git add server-backups/
        
        # Commit changes
        git commit -m "� File backup - $(date +%Y-%m-%d)
        
        - World files copied
        - Config files copied  
        - Plugin files copied
        - Settings files copied
        
        NOTE: This is FILE BACKUP only - no server created!
        Workflow: ${{ github.run_id }}"
        
        # Push to repository
        git push
        
    - name: Cleanup old backups
      run: |
        echo "Cleaning up old backups (keeping last 7 days)..."
        # Remove backup files older than 7 days
        find server-backups -name "*.tar.gz" -mtime +7 -delete
        find server-backups -name "BACKUP_MANIFEST_*.md" -mtime +7 -delete
        
        # Commit cleanup
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add server-backups/
        git diff --staged --quiet || git commit -m "🧹 Cleaned up old backups - $(date +%Y-%m-%d)"
        git push
