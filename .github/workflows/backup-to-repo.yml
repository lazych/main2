name: 📁 Backup Files to Repository (NO SERVER)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [backup_trigger, quick_backup_trigger]
  schedule:
    # Backup daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        
    # NO Java setup needed - we're just copying files!
# NO cache restore - use repository backups only
          
    - name: Create backup directories
      run: |
        mkdir -p server-backups/worlds
        mkdir -p server-backups/configs
        mkdir -p server-backups/playerdata
        mkdir -p server-backups/plugins
        mkdir -p server-backups/logs
        
    - name: Check backup type
      id: backup_type
      run: |
        if [ "${{ github.event.client_payload.type }}" = "quick_backup" ]; then
          echo "type=quick" >> $GITHUB_OUTPUT
        else
          echo "type=full" >> $GITHUB_OUTPUT
        fi
        
    - name: Quick backup (every 50 minutes)
      if: steps.backup_type.outputs.type == 'quick'
      run: |
        echo "Quick backup disabled - only repository commits"
        echo "Quick backups are handled by main workflow"
        echo "This workflow only handles repository commits"
        echo "NO server files accessed - READ ONLY"
        
    - name: Backup world data
      if: steps.backup_type.outputs.type == 'full'
      run: |
        echo "World backup DISABLED - prevents server interference"
        echo "World data is backed up by main workflow"
        echo "This workflow only commits existing repository files"
        echo "NO server access - READ ONLY REPOSITORY OPERATIONS"
        
    - name: Backup server configurations
      run: |
        echo "Config backup DISABLED - prevents server interference"
        echo "Config files are backed up by main workflow"
        echo "This workflow only commits existing repository files"
        echo "NO server access - READ ONLY REPOSITORY OPERATIONS"
        
    - name: Backup player data
      run: |
        echo "Player data backup DISABLED - prevents server interference"
        echo "Player data is backed up by main workflow"
        echo "This workflow only commits existing repository files"
        echo "NO server access - READ ONLY REPOSITORY OPERATIONS"
        
    - name: Backup plugins and configs
      run: |
        echo "Plugin backup DISABLED - prevents server interference"
        echo "Plugin data is backed up by main workflow"
        echo "This workflow only commits existing repository files"
        echo "NO server access - READ ONLY REPOSITORY OPERATIONS"
        
    - name: Backup recent logs
      run: |
        echo "Log backup DISABLED - prevents server interference"
        echo "Log data is backed up by main workflow"
        echo "This workflow only commits existing repository files"
        echo "NO server access - READ ONLY REPOSITORY OPERATIONS"
        
    - name: Create backup manifest
      run: |
        echo "Creating backup manifest..."
        cat > server-backups/BACKUP_MANIFEST_$(date +%Y%m%d).md << EOF
        # Repository Backup Manifest
        
        **Date:** $(date)
        **Workflow Run:** ${{ github.run_id }}
        
        ## IMPORTANT: READ ONLY BACKUP
        
        This workflow does NOT access server files to prevent interference.
        All server backups are handled by the main workflow.
        
        ## What This Workflow Does:
        - ✅ Commits existing repository files
        - ✅ Cleans up old repository files
        - ❌ Does NOT access server cache
        - ❌ Does NOT start any servers
        - ❌ Does NOT copy server files
        
        ## Real Server Backups:
        Server backups are created by: \`mc-server-24-7-fixed.yml\`
        - Every 50 minutes (quick backups)
        - Every 12 hours (full backups)
        - Stored in GitHub Actions cache
        
        ## Repository Files:
        - \`server-backups/\` - Committed by main workflow
        - \`plugins/\` - Plugin JARs and configs
        - \`README-MC-Server.md\` - Documentation
        
        **Note:** This is a READ-ONLY repository operation workflow.
        EOF
        
    - name: Commit and push backup
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add all backup files
        git add server-backups/
        
        # Commit changes
        git commit -m "� File backup - $(date +%Y-%m-%d)
        
        - World files copied
        - Config files copied  
        - Plugin files copied
        - Settings files copied
        
        NOTE: This is FILE BACKUP only - no server created!
        Workflow: ${{ github.run_id }}"
        
        # Push to repository
        git push
        
    - name: Cleanup old backups
      run: |
        echo "Cleaning up old backups (keeping last 7 days)..."
        # Remove backup files older than 7 days
        find server-backups -name "*.tar.gz" -mtime +7 -delete
        find server-backups -name "BACKUP_MANIFEST_*.md" -mtime +7 -delete
        
        # Commit cleanup
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add server-backups/
        git diff --staged --quiet || git commit -m "🧹 Cleaned up old backups - $(date +%Y-%m-%d)"
        git push
