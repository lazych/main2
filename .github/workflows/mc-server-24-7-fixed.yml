name: Minecraft Server 24/7 with CraftIP (FIXED)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Keep server alive - run every 5 hours
    - cron: '0 */5 * * *'

jobs:
  minecraft-server:
    runs-on: ubuntu-latest
    # Keep job running indefinitely (but within reasonable limits)
    timeout-minutes: 300  # 5 hours (safer buffer)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Minecraft data (FIXED)
      uses: actions/cache@v4
      with:
        path: |
          minecraft-data
          craftip-logs
        key: mc-server-cache-v1-${{ github.ref }}
        restore-keys: |
          mc-server-cache-v1-
          
    - name: Create server directories
      run: |
        mkdir -p minecraft-data/world
        mkdir -p minecraft-data/plugins
        mkdir -p minecraft-data/logs
        mkdir -p craftip-logs
        mkdir -p minecraft-data/backups
        
    - name: Download Minecraft Server
      run: |
        if [ ! -f minecraft-data/server.jar ]; then
          wget https://github.com/azuraclient/MinecraftConsoles/releases/download/s/server.jar \
            -O minecraft-data/server.jar
        fi
        
    - name: Accept EULA
      run: |
        echo "eula=true" > minecraft-data/eula.txt
        
    - name: Configure server properties
      run: |
        # Priority: Repository > Cache > Default
        if [ -f server.properties ]; then
          echo "Using repository server.properties"
          cp server.properties minecraft-data/
        elif [ ! -f minecraft-data/server.properties ]; then
          echo "No server.properties found, creating default..."
          cat > minecraft-data/server.properties << EOF
        motd=GitHub Actions Minecraft Server
        difficulty=normal
        gamemode=survival
        spawn-protection=0
        online-mode=false
        pvp=true
        allow-flight=false
        level-type=default
        generate-structures=true
        max-players=20
        level-name=world
        server-port=25565
        EOF
        else
          echo "Using cached server.properties"
        fi
        
    - name: Initialize ops.json
      run: |
        # Only create ops.json if it doesn't exist (preserve existing ops)
        if [ ! -f minecraft-data/ops.json ]; then
          echo '[]' > minecraft-data/ops.json
        fi
        
    - name: Initialize whitelist.json
      run: |
        # Only create whitelist.json if it doesn't exist (preserve existing whitelist)
        if [ ! -f minecraft-data/whitelist.json ]; then
          echo '[]' > minecraft-data/whitelist.json
        fi
        
    - name: Setup plugins directory
      run: |
        # Create plugins directory and ensure it's preserved
        if [ ! -d minecraft-data/plugins ]; then
          mkdir -p minecraft-data/plugins
        fi
        
    - name: Restore world from repository (if cache empty)
      run: |
        echo "Checking if world needs to be restored from repository..."
        if [ ! -d "minecraft-data/world" ] || [ -z "$(ls -A minecraft-data/world 2>/dev/null)" ]; then
          echo "World directory is empty, attempting restore from repository..."
          if [ -d "server-backups/worlds" ]; then
            # Find latest world backup
            LATEST_WORLD=$(find server-backups/worlds -name "world-*.tar.gz" | sort -r | head -1)
            if [ -n "$LATEST_WORLD" ]; then
              echo "Restoring world from: $LATEST_WORLD"
              tar -xzf "$LATEST_WORLD" -C minecraft-data/
              echo "World restored from repository backup"
            else
              echo "No world backup found in repository"
            fi
          fi
        else
          echo "World directory exists, skipping restore"
        fi
        
    - name: Copy plugins from repository (COMPLETE)
      run: |
        echo "Copying plugins from repository to server directory..."
        if [ -d "plugins" ]; then
          # Copy ENTIRE plugins directory (not just .jar files)
          cp -r plugins/* minecraft-data/plugins/ 2>/dev/null || echo "No plugin files found"
          echo "COMPLETE plugin directory copied from repository"
          
          # List copied items
          echo "Copied plugin contents:"
          ls -la minecraft-data/plugins/ 2>/dev/null || echo "No plugins directory"
          
          # Show what was copied
          echo "Plugin JARs:"
          ls -la minecraft-data/plugins/*.jar 2>/dev/null || echo "No .jar files"
          echo "Plugin configs:"
          find minecraft-data/plugins -name "*.yml" -o -name "*.json" -o -name "*.conf" 2>/dev/null || echo "No config files"
          echo "Plugin data folders:"
          find minecraft-data/plugins -type d -name "data" -o -name "config" 2>/dev/null || echo "No data folders"
        else
          echo "No plugins directory found in repository"
        fi
        
    - name: Build CraftIP client
      run: |
        cd craftip
        cargo build --release --bin client
        
    - name: Start Minecraft Server
      run: |
        cd minecraft-data
        java -Xmx2G -Xms1G -jar server.jar nogui &
        echo $! > minecraft.pid
        sleep 30
        
    - name: Wait for Minecraft server to start (FIXED)
      run: |
        echo "Waiting for Minecraft server to be ready..."
        for i in {1..60}; do
          # Use ss instead of netstat (more reliable)
          if ss -tlnp | grep :25565 > /dev/null; then
            echo "Minecraft server is ready!"
            break
          fi
          echo "Attempt $i: Server not ready yet..."
          sleep 5
        done
        
    - name: Start CraftIP Client (FIXED)
      run: |
        echo "Starting CraftIP client..."
        cd craftip
        # Add error handling
        if [ ! -f ./target/release/client ]; then
          echo "CraftIP client binary not found, building..."
          cargo build --release --bin client
        fi
        
        ./target/release/client localhost:25565 &
        echo $! > craftip.pid
        sleep 10
        
    - name: Backup critical files (FIXED)
      run: |
        echo "Creating backup of critical server files..."
        BACKUP_DIR="minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
        mkdir -p "$BACKUP_DIR"
        
        # Backup essential files (FIXED - removed duplicate)
        cp minecraft-data/server.properties "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/eula.txt "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/ops.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/whitelist.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-players.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-ips.json "$BACKUP_DIR/" 2>/dev/null || true
        
        # Backup plugins directory
        if [ -d "minecraft-data/plugins" ]; then
          cp -r minecraft-data/plugins "$BACKUP_DIR/"
        fi
        
        # Backup world data (this might take time for large worlds)
        if [ -d "minecraft-data/world" ]; then
          cp -r minecraft-data/world "$BACKUP_DIR/"
        fi
        
        echo "Backup created at: $BACKUP_DIR"
        
        # Keep only last 5 backups to save space
        cd minecraft-data/backups
        ls -t | tail -n +6 | xargs -r rm -rf
        
        # Repository backup DISABLED - prevents server interference
        echo "Repository backup disabled - backup workflow was interfering with server"
        echo "Server backups are stored in GitHub Actions cache only"
        echo "No repository commits to prevent server conflicts"
        
    - name: Keep services alive (FIXED)
      run: |
        echo "Starting monitoring loop..."
        # Add loop counter to prevent infinite loops (5 hours max)
        LOOP_COUNTER=0
        MAX_LOOPS=600  # 5 hours * 60 minutes * 60 seconds / 30 seconds
        
        while [ $LOOP_COUNTER -lt $MAX_LOOPS ]; do
          # Check if Minecraft server is still running
          if ! kill -0 $(cat minecraft-data/minecraft.pid 2>/dev/null) 2>/dev/null; then
            echo "Minecraft server died, restarting..."
            cd minecraft-data
            java -Xmx2G -Xms1G -jar server.jar nogui &
            echo $! > minecraft.pid
            sleep 30
          fi
          
          # Check if CraftIP client is still running
          if ! kill -0 $(cat craftip/craftip.pid 2>/dev/null) 2>/dev/null; then
            echo "CraftIP client died, restarting..."
            cd craftip
            ./target/release/client localhost:25565 &
            echo $! > craftip.pid
          fi
          
          # Show status every 10 minutes
          if [ $(($(date +%s) % 600)) -lt 30 ]; then
            echo "=== Status Check ==="
            echo "Minecraft PID: $(cat minecraft-data/minecraft.pid 2>/dev/null || echo 'Not found')"
            echo "CraftIP PID: $(cat craftip/craftip.pid 2>/dev/null || echo 'Not found')"
            ss -tlnp | grep :25565 || echo "Port 25565 not listening"
            
            echo "=== Server Files Status ==="
            echo "server.properties: $([ -f minecraft-data/server.properties ] && echo 'Exists' || echo 'Missing')"
            echo "eula.txt: $([ -f minecraft-data/eula.txt ] && echo 'Exists' || echo 'Missing')"
            echo "ops.json: $([ -f minecraft-data/ops.json ] && echo 'Exists' || echo 'Missing')"
            echo "whitelist.json: $([ -f minecraft-data/whitelist.json ] && echo 'Exists' || echo 'Missing')"
            echo "plugins directory: $([ -d minecraft-data/plugins ] && echo 'Exists' || echo 'Missing')"
            echo "world directory: $([ -d minecraft-data/world ] && echo 'Exists' || echo 'Missing')"
            
            # Create backup every 5 hours (matches workflow duration)
            if [ $(($(date +%s) % 18000)) -lt 30 ]; then
              echo "=== Creating Scheduled Backup ==="
              BACKUP_DIR="minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp minecraft-data/server.properties "$BACKUP_DIR/" 2>/dev/null || true
              cp minecraft-data/ops.json "$BACKUP_DIR/" 2>/dev/null || true
              cp minecraft-data/whitelist.json "$BACKUP_DIR/" 2>/dev/null || true
              if [ -d "minecraft-data/plugins" ]; then
                cp -r minecraft-data/plugins "$BACKUP_DIR/"
              fi
              if [ -d "minecraft-data/world" ]; then
                cp -r minecraft-data/world "$BACKUP_DIR/"
              fi
              echo "Scheduled backup created at: $BACKUP_DIR"
              
              # Keep only last 3 scheduled backups
              cd minecraft-data/backups
              ls -t | tail -n +4 | xargs -r rm -rf
            fi
          fi
          
          sleep 30
          LOOP_COUNTER=$((LOOP_COUNTER + 1))
          
          # Save to repository every 100 iterations (about 50 minutes)
          if [ $((LOOP_COUNTER % 100)) -eq 0 ]; then
            echo "Saving progress to repository..."
            # Create quick backup of critical files
            QUICK_BACKUP="minecraft-data/backups/quick-$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$QUICK_BACKUP"
            
            # Backup essential files only (quick backup)
            cp minecraft-data/server.properties "$QUICK_BACKUP/" 2>/dev/null || true
            cp minecraft-data/ops.json "$QUICK_BACKUP/" 2>/dev/null || true
            cp minecraft-data/whitelist.json "$QUICK_BACKUP/" 2>/dev/null || true
            
            # Quick world backup (level.dat only)
            if [ -f "minecraft-data/world/level.dat" ]; then
              mkdir -p "$QUICK_BACKUP/world"
              cp minecraft-data/world/level.dat "$QUICK_BACKUP/world/" 2>/dev/null || true
            fi
            
            echo "Quick backup created: $QUICK_BACKUP"
            
            # Repository backup DISABLED - prevents server interference
            echo "Quick repository backup disabled - prevents server conflicts"
            echo "Server backups stored in GitHub Actions cache only"
            echo "No repository commits to prevent server interference"
          fi
        done
        
        echo "Monitoring loop completed after $LOOP_COUNTER iterations"
        
    - name: Final backup before workflow ends
      if: always()  # Runs even if previous steps failed
      run: |
        echo "Creating final backup before workflow ends..."
        
        # Create final backup directory
        FINAL_BACKUP="minecraft-data/backups/final-$(date +%Y%m%d_%H%M%S)"
        mkdir -p "$FINAL_BACKUP"
        
        # Backup critical files
        cp minecraft-data/server.properties "$FINAL_BACKUP/" 2>/dev/null || true
        cp minecraft-data/eula.txt "$FINAL_BACKUP/" 2>/dev/null || true
        cp minecraft-data/ops.json "$FINAL_BACKUP/" 2>/dev/null || true
        cp minecraft-data/whitelist.json "$FINAL_BACKUP/" 2>/dev/null || true
        cp minecraft-data/banned-players.json "$FINAL_BACKUP/" 2>/dev/null || true
        cp minecraft-data/banned-ips.json "$FINAL_BACKUP/" 2>/dev/null || true
        
        # Backup world data (important!)
        if [ -d "minecraft-data/world" ]; then
          echo "Backing up world data..."
          tar -czf "$FINAL_BACKUP/world.tar.gz" -C minecraft-data world/
        fi
        
        # Backup plugins
        if [ -d "minecraft-data/plugins" ]; then
          echo "Backing up plugins..."
          tar -czf "$FINAL_BACKUP/plugins.tar.gz" -C minecraft-data plugins/
        fi
        
        # Backup player data
        if [ -d "minecraft-data/playerdata" ]; then
          echo "Backing up player data..."
          tar -czf "$FINAL_BACKUP/playerdata.tar.gz" -C minecraft-data playerdata/
        fi
        
        echo "Final backup created: $FINAL_BACKUP"
        
    - name: Push final backup to repository
      if: always()  # Runs even if previous steps failed
      run: |
        echo "Pushing final backup to repository..."
        
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Create server-backups directory if not exists
        mkdir -p server-backups/final-backups
        
        # Copy final backup to repository
        cp -r minecraft-data/backups/final-* server-backups/final-backups/ 2>/dev/null || true
        
        # Add to git
        git add server-backups/final-backups/
        
        # Commit changes
        git diff --staged --quiet || git commit -m "🏁 Final server backup - $(date +%Y-%m-%d %H:%M:%S)
        
        Server instance ended after $LOOP_COUNTER iterations
        - World data backup
        - Player data backup  
        - Plugin configurations backup
        - Server settings backup
        
        This backup preserves server state between workflow runs.
        Workflow: ${{ github.run_id }}"
        
        # Push to repository
        git push || echo "Push failed (repository may be locked)"
        
        echo "Final backup pushed to repository"
        echo "Server data preserved for next instance"
