name: Minecraft Server 24/7 with CraftIP (FIXED)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Keep server alive - run every 5 hours
    - cron: '0 */5 * * *'

# Grant write permissions so we can push backups
permissions:
  contents: write

jobs:
  minecraft-server:
    runs-on: ubuntu-latest
    # Keep job running indefinitely (but within reasonable limits)
    timeout-minutes: 300  # 5 hours (safer buffer)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Minecraft data (FIXED)
      uses: actions/cache@v4
      with:
        path: |
          minecraft-data
          craftip-logs
        key: mc-server-cache-v1-${{ github.ref }}
        restore-keys: |
          mc-server-cache-v1-
          
    - name: Create server directories
      run: |
        mkdir -p minecraft-data/world
        mkdir -p minecraft-data/plugins
        mkdir -p minecraft-data/logs
        mkdir -p craftip-logs
        mkdir -p minecraft-data/backups
        
    - name: Download Minecraft Server
      run: |
        if [ ! -f minecraft-data/server.jar ]; then
          wget https://github.com/azuraclient/MinecraftConsoles/releases/download/s/server.jar \
            -O minecraft-data/server.jar
        fi
        
    - name: Accept EULA
      run: |
        echo "eula=true" > minecraft-data/eula.txt
        
    - name: Configure server properties
      run: |
        # Priority: Repository > Cache > Default
        if [ -f server.properties ]; then
          echo "Using repository server.properties"
          cp server.properties minecraft-data/
        fi
        if [ -f server-icon.png ]; then
          echo "Using repository server-icon.png"
          cp server-icon.png minecraft-data/
        fi
        
        if [ ! -f minecraft-data/server.properties ]; then
          echo "No server.properties found, creating default..."
          cat > minecraft-data/server.properties << EOF
        motd=GitHub Actions Minecraft Server
        difficulty=normal
        gamemode=survival
        spawn-protection=0
        online-mode=false
        pvp=true
        allow-flight=false
        level-type=default
        generate-structures=true
        max-players=20
        level-name=world
        server-port=25565
        EOF
        else
          echo "Using cached server.properties"
        fi
        
    - name: Initialize server JSON configs
      run: |
        # Copy JSON configs from repo if they exist
        for config in ops.json whitelist.json banned-players.json banned-ips.json; do
          if [ -f "$config" ]; then
            echo "Using repository $config"
            cp "$config" minecraft-data/
          elif [ ! -f "minecraft-data/$config" ]; then
            echo "No $config found, creating default..."
            echo '[]' > "minecraft-data/$config"
          fi
        done
        
    - name: Setup plugins directory
      run: |
        # Create plugins directory and ensure it's preserved
        if [ ! -d minecraft-data/plugins ]; then
          mkdir -p minecraft-data/plugins
        fi
        
    - name: Restore worlds from repository (if cache empty)
      run: |
        echo "Checking if worlds need to be restored from repository..."
        # Restore all world directories (world, world_nether, world_the_end, custom worlds)
        for WORLD_DIR in world*/; do
          if [ -d "$WORLD_DIR" ] && [ -n "$(ls -A "$WORLD_DIR" 2>/dev/null)" ]; then
            if [ ! -d "minecraft-data/$WORLD_DIR" ] || [ -z "$(ls -A "minecraft-data/$WORLD_DIR" 2>/dev/null)" ]; then
              echo "Restoring $WORLD_DIR from repository..."
              mkdir -p "minecraft-data/$WORLD_DIR"
              cp -r "$WORLD_DIR"* "minecraft-data/$WORLD_DIR"
              echo "$WORLD_DIR restored"
            else
              echo "$WORLD_DIR already exists in cache, skipping"
            fi
          fi
        done
        
    - name: Copy plugins from repository (COMPLETE)
      run: |
        echo "Copying plugins from repository to server directory..."
        if [ -d "plugins" ]; then
          # Copy ENTIRE plugins directory (not just .jar files)
          cp -r plugins/* minecraft-data/plugins/ 2>/dev/null || echo "No plugin files found"
          echo "COMPLETE plugin directory copied from repository"
          
          # List copied items
          echo "Copied plugin contents:"
          ls -la minecraft-data/plugins/ 2>/dev/null || echo "No plugins directory"
          
          # Show what was copied
          echo "Plugin JARs:"
          ls -la minecraft-data/plugins/*.jar 2>/dev/null || echo "No .jar files"
          echo "Plugin configs:"
          find minecraft-data/plugins -name "*.yml" -o -name "*.json" -o -name "*.conf" 2>/dev/null || echo "No config files"
          echo "Plugin data folders:"
          find minecraft-data/plugins -type d -name "data" -o -name "config" 2>/dev/null || echo "No data folders"
        else
          echo "No plugins directory found in repository"
        fi
        
    - name: Build CraftIP client
      run: |
        cd craftip
        cargo build --release --bin client
        
    - name: Start Minecraft Server
      run: |
        cd minecraft-data
        java -Xmx2G -Xms1G -jar server.jar nogui &
        echo $! > minecraft.pid
        sleep 30
        
    - name: Wait for Minecraft server to start (FIXED)
      run: |
        echo "Waiting for Minecraft server to be ready..."
        for i in {1..60}; do
          # Use ss instead of netstat (more reliable)
          if ss -tlnp | grep :25565 > /dev/null; then
            echo "Minecraft server is ready!"
            break
          fi
          echo "Attempt $i: Server not ready yet..."
          sleep 5
        done
        
    - name: Start CraftIP Client (FIXED)
      run: |
        echo "Starting CraftIP client..."
        cd craftip
        # Add error handling
        if [ ! -f ./target/release/client ]; then
          echo "CraftIP client binary not found, building..."
          cargo build --release --bin client
        fi
        
        ./target/release/client localhost:25565 &
        echo $! > craftip.pid
        sleep 10
        
    - name: Backup critical files (FIXED)
      run: |
        echo "Creating backup of critical server files..."
        BACKUP_DIR="minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
        mkdir -p "$BACKUP_DIR"
        
        # Backup essential files (FIXED - removed duplicate)
        cp minecraft-data/server.properties "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/eula.txt "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/ops.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/whitelist.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-players.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-ips.json "$BACKUP_DIR/" 2>/dev/null || true
        
        # Backup plugins directory
        if [ -d "minecraft-data/plugins" ]; then
          cp -r minecraft-data/plugins "$BACKUP_DIR/"
        fi
        
        # Backup world data (this might take time for large worlds)
        if [ -d "minecraft-data/world" ]; then
          cp -r minecraft-data/world "$BACKUP_DIR/"
        fi
        
        echo "Backup created at: $BACKUP_DIR"
        
        # Keep only last 5 backups to save space
        cd minecraft-data/backups
        ls -t | tail -n +6 | xargs -r rm -rf
        
    - name: Keep services alive (FIXED)
      run: |
        echo "Starting monitoring loop..."
        WORK_DIR="$(pwd)"
        # Add loop counter to prevent infinite loops (5 hours max)
        LOOP_COUNTER=0
        MAX_LOOPS=600  # 5 hours * 60 minutes * 60 seconds / 30 seconds
        
        while [ $LOOP_COUNTER -lt $MAX_LOOPS ]; do
          # Check if Minecraft server is still running (use absolute paths)
          if ! kill -0 $(cat "$WORK_DIR/minecraft-data/minecraft.pid" 2>/dev/null) 2>/dev/null; then
            echo "Minecraft server died, restarting..."
            cd "$WORK_DIR/minecraft-data"
            java -Xmx2G -Xms1G -jar server.jar nogui &
            echo $! > minecraft.pid
            cd "$WORK_DIR"
            sleep 30
          fi
          
          # Check if CraftIP client is still running
          if ! kill -0 $(cat "$WORK_DIR/craftip/craftip.pid" 2>/dev/null) 2>/dev/null; then
            echo "CraftIP client died, restarting..."
            cd "$WORK_DIR/craftip"
            ./target/release/client localhost:25565 &
            echo $! > craftip.pid
            cd "$WORK_DIR"
          fi
          
          # Show status every 10 minutes
          if [ $(($(date +%s) % 600)) -lt 30 ]; then
            echo "=== Status Check ==="
            echo "Minecraft PID: $(cat "$WORK_DIR/minecraft-data/minecraft.pid" 2>/dev/null || echo 'Not found')"
            echo "CraftIP PID: $(cat "$WORK_DIR/craftip/craftip.pid" 2>/dev/null || echo 'Not found')"
            ss -tlnp | grep :25565 || echo "Port 25565 not listening"
            
            echo "=== Server Files Status ==="
            echo "server.properties: $([ -f "$WORK_DIR/minecraft-data/server.properties" ] && echo 'Exists' || echo 'Missing')"
            echo "eula.txt: $([ -f "$WORK_DIR/minecraft-data/eula.txt" ] && echo 'Exists' || echo 'Missing')"
            echo "ops.json: $([ -f "$WORK_DIR/minecraft-data/ops.json" ] && echo 'Exists' || echo 'Missing')"
            echo "whitelist.json: $([ -f "$WORK_DIR/minecraft-data/whitelist.json" ] && echo 'Exists' || echo 'Missing')"
            echo "plugins directory: $([ -d "$WORK_DIR/minecraft-data/plugins" ] && echo 'Exists' || echo 'Missing')"
            echo "world directory: $([ -d "$WORK_DIR/minecraft-data/world" ] && echo 'Exists' || echo 'Missing')"
            
            # Create backup every 5 hours (matches workflow duration)
            if [ $(($(date +%s) % 18000)) -lt 30 ]; then
              echo "=== Creating Scheduled Backup ==="
              BACKUP_DIR="$WORK_DIR/minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp "$WORK_DIR/minecraft-data/server.properties" "$BACKUP_DIR/" 2>/dev/null || true
              cp "$WORK_DIR/minecraft-data/ops.json" "$BACKUP_DIR/" 2>/dev/null || true
              cp "$WORK_DIR/minecraft-data/whitelist.json" "$BACKUP_DIR/" 2>/dev/null || true
              if [ -d "$WORK_DIR/minecraft-data/plugins" ]; then
                cp -r "$WORK_DIR/minecraft-data/plugins" "$BACKUP_DIR/"
              fi
              if [ -d "$WORK_DIR/minecraft-data/world" ]; then
                cp -r "$WORK_DIR/minecraft-data/world" "$BACKUP_DIR/"
              fi
              echo "Scheduled backup created at: $BACKUP_DIR"
              
              # Keep only last 3 scheduled backups
              cd "$WORK_DIR/minecraft-data/backups"
              ls -t | tail -n +4 | xargs -r rm -rf
              cd "$WORK_DIR"
            fi
          fi
          
          sleep 30
          LOOP_COUNTER=$((LOOP_COUNTER + 1))
          
          # Save to repository every 100 iterations (about 50 minutes)
          if [ $((LOOP_COUNTER % 100)) -eq 0 ]; then
            echo "Saving progress to repository..."
            # Create quick backup of critical files
            QUICK_BACKUP="$WORK_DIR/minecraft-data/backups/quick-$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$QUICK_BACKUP"
            
            # Backup essential files only (quick backup)
            cp "$WORK_DIR/minecraft-data/server.properties" "$QUICK_BACKUP/" 2>/dev/null || true
            cp "$WORK_DIR/minecraft-data/ops.json" "$QUICK_BACKUP/" 2>/dev/null || true
            cp "$WORK_DIR/minecraft-data/whitelist.json" "$QUICK_BACKUP/" 2>/dev/null || true
            
            # Quick world backup (level.dat only)
            if [ -f "$WORK_DIR/minecraft-data/world/level.dat" ]; then
              mkdir -p "$QUICK_BACKUP/world"
              cp "$WORK_DIR/minecraft-data/world/level.dat" "$QUICK_BACKUP/world/" 2>/dev/null || true
            fi
            
            echo "Quick backup created: $QUICK_BACKUP"
          fi
        done
        
        echo "Monitoring loop completed after $LOOP_COUNTER iterations"
        
    - name: Save server files to repository
      if: always()  # Runs even if previous steps failed
      run: |
        echo "Saving server files to repository..."
        
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Unshallow the clone so we can pull/push properly
        git fetch --unshallow origin main || git fetch origin main
        
        # Pull latest changes (repo may have new commits after 5 hours)
        git pull --rebase origin main || true
        
        # --- Copy server files directly to repo ---
        
        # Save all world directories (world, world_nether, world_the_end, custom worlds)
        for WORLD_DIR in minecraft-data/world*/; do
          if [ -d "$WORLD_DIR" ] && [ -n "$(ls -A "$WORLD_DIR" 2>/dev/null)" ]; then
            WORLD_NAME=$(basename "$WORLD_DIR")
            echo "Saving $WORLD_NAME..."
            mkdir -p "$WORLD_NAME"
            rm -rf "$WORLD_NAME"/*
            cp -r "$WORLD_DIR"* "$WORLD_NAME/"
          fi
        done
        
        # Save server configs to repo root
        cp minecraft-data/server.properties server.properties 2>/dev/null || true
        cp minecraft-data/server-icon.png server-icon.png 2>/dev/null || true
        cp minecraft-data/ops.json ops.json 2>/dev/null || true
        cp minecraft-data/whitelist.json whitelist.json 2>/dev/null || true
        cp minecraft-data/banned-players.json banned-players.json 2>/dev/null || true
        cp minecraft-data/banned-ips.json banned-ips.json 2>/dev/null || true
        
        # Save plugins (jars + configs)
        if [ -d "minecraft-data/plugins" ]; then
          echo "Saving plugins..."
          cp -r minecraft-data/plugins/* plugins/ 2>/dev/null || true
        fi
        
        # Add everything to git (world* catches all world dirs)
        git add -A world*/ plugins/ server.properties server-icon.png ops.json whitelist.json banned-players.json banned-ips.json 2>/dev/null || true
        
        # Commit changes
        git diff --staged --quiet || git commit -m "Server data saved - $(date +'%Y-%m-%d %H:%M:%S')"
        
        # Push to repository (retry once if it fails)
        git push origin main || {
          echo "First push failed, retrying after pull..."
          git pull --rebase origin main
          git push origin main
        } || echo "Push failed after retry"
        
        echo "Server files saved to repository"
