name: Minecraft Server 24/7 with CraftIP (FIXED)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Keep server alive - run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  minecraft-server:
    runs-on: ubuntu-latest
    # Keep job running indefinitely (but within reasonable limits)
    timeout-minutes: 360  # 6 hours (GitHub Actions limit)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Minecraft data (FIXED)
      uses: actions/cache@v4
      with:
        path: |
          minecraft-data
          craftip-logs
        key: mc-server-cache-v1-${{ github.ref }}
        restore-keys: |
          mc-server-cache-v1-
          
    - name: Create server directories
      run: |
        mkdir -p minecraft-data/world
        mkdir -p minecraft-data/plugins
        mkdir -p minecraft-data/logs
        mkdir -p craftip-logs
        mkdir -p minecraft-data/backups
        
    - name: Download Minecraft Server
      run: |
        if [ ! -f minecraft-data/server.jar ]; then
          wget https://piston-data.mojang.com/v1/objects/84194a2f286ef7c14ed7ce0090dba59902951553/server.jar \
            -O minecraft-data/server.jar
        fi
        
    - name: Accept EULA
      run: |
        echo "eula=true" > minecraft-data/eula.txt
        
    - name: Configure server properties
      run: |
        # Only create server.properties if it doesn't exist (preserve existing config)
        if [ ! -f minecraft-data/server.properties ]; then
          cat > minecraft-data/server.properties << EOF
        motd=GitHub Actions Minecraft Server
        difficulty=normal
        gamemode=survival
        spawn-protection=0
        online-mode=false
        pvp=true
        allow-flight=false
        level-type=default
        generate-structures=true
        max-players=20
        level-name=world
        server-port=25565
        EOF
        fi
        
    - name: Initialize ops.json
      run: |
        # Only create ops.json if it doesn't exist (preserve existing ops)
        if [ ! -f minecraft-data/ops.json ]; then
          echo '[]' > minecraft-data/ops.json
        fi
        
    - name: Initialize whitelist.json
      run: |
        # Only create whitelist.json if it doesn't exist (preserve existing whitelist)
        if [ ! -f minecraft-data/whitelist.json ]; then
          echo '[]' > minecraft-data/whitelist.json
        fi
        
    - name: Setup plugins directory
      run: |
        # Create plugins directory and ensure it's preserved
        if [ ! -d minecraft-data/plugins ]; then
          mkdir -p minecraft-data/plugins
        fi
        
    - name: Copy plugins from repository
      run: |
        echo "Copying plugins from repository to server directory..."
        if [ -d "plugins" ]; then
          # Copy all .jar files from repository plugins directory
          cp plugins/*.jar minecraft-data/plugins/ 2>/dev/null || echo "No .jar files found in plugins directory"
          echo "Repository plugins copied to server"
          
          # List copied plugins
          echo "Copied plugins:"
          ls -la minecraft-data/plugins/*.jar 2>/dev/null || echo "No plugins found"
        else
          echo "No plugins directory found in repository"
        fi
        
    - name: Build CraftIP client
      run: |
        cd craftip
        cargo build --release --bin client
        
    - name: Start Minecraft Server
      run: |
        cd minecraft-data
        java -Xmx2G -Xms1G -jar server.jar nogui &
        echo $! > minecraft.pid
        sleep 30
        
    - name: Wait for Minecraft server to start (FIXED)
      run: |
        echo "Waiting for Minecraft server to be ready..."
        for i in {1..60}; do
          # Use ss instead of netstat (more reliable)
          if ss -tlnp | grep :25565 > /dev/null; then
            echo "Minecraft server is ready!"
            break
          fi
          echo "Attempt $i: Server not ready yet..."
          sleep 5
        done
        
    - name: Start CraftIP Client (FIXED)
      run: |
        echo "Starting CraftIP client..."
        cd craftip
        # Add error handling
        if [ ! -f ./target/release/client ]; then
          echo "CraftIP client binary not found, building..."
          cargo build --release --bin client
        fi
        
        ./target/release/client localhost:25565 &
        echo $! > craftip.pid
        sleep 10
        
    - name: Backup critical files (FIXED)
      run: |
        echo "Creating backup of critical server files..."
        BACKUP_DIR="minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
        mkdir -p "$BACKUP_DIR"
        
        # Backup essential files (FIXED - removed duplicate)
        cp minecraft-data/server.properties "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/eula.txt "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/ops.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/whitelist.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-players.json "$BACKUP_DIR/" 2>/dev/null || true
        cp minecraft-data/banned-ips.json "$BACKUP_DIR/" 2>/dev/null || true
        
        # Backup plugins directory
        if [ -d "minecraft-data/plugins" ]; then
          cp -r minecraft-data/plugins "$BACKUP_DIR/"
        fi
        
        # Backup world data (this might take time for large worlds)
        if [ -d "minecraft-data/world" ]; then
          cp -r minecraft-data/world "$BACKUP_DIR/"
        fi
        
        echo "Backup created at: $BACKUP_DIR"
        
        # Keep only last 5 backups to save space
        cd minecraft-data/backups
        ls -t | tail -n +6 | xargs -r rm -rf
        
        # Trigger repository backup (optional - comment out if not needed)
        echo "Triggering repository backup workflow..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type":"backup_trigger","client_payload":{"run_id":"${{ github.run_id }}"}}' || echo "Failed to trigger backup"
        
    - name: Keep services alive (FIXED)
      run: |
        echo "Starting monitoring loop..."
        # Add loop counter to prevent infinite loops (6 hours max)
        LOOP_COUNTER=0
        MAX_LOOPS=720  # 6 hours * 60 minutes * 60 seconds / 30 seconds
        
        while [ $LOOP_COUNTER -lt $MAX_LOOPS ]; do
          # Check if Minecraft server is still running
          if ! kill -0 $(cat minecraft-data/minecraft.pid 2>/dev/null) 2>/dev/null; then
            echo "Minecraft server died, restarting..."
            cd minecraft-data
            java -Xmx2G -Xms1G -jar server.jar nogui &
            echo $! > minecraft.pid
            sleep 30
          fi
          
          # Check if CraftIP client is still running
          if ! kill -0 $(cat craftip/craftip.pid 2>/dev/null) 2>/dev/null; then
            echo "CraftIP client died, restarting..."
            cd craftip
            ./target/release/client localhost:25565 &
            echo $! > craftip.pid
          fi
          
          # Show status every 10 minutes
          if [ $(($(date +%s) % 600)) -lt 30 ]; then
            echo "=== Status Check ==="
            echo "Minecraft PID: $(cat minecraft-data/minecraft.pid 2>/dev/null || echo 'Not found')"
            echo "CraftIP PID: $(cat craftip/craftip.pid 2>/dev/null || echo 'Not found')"
            ss -tlnp | grep :25565 || echo "Port 25565 not listening"
            
            echo "=== Server Files Status ==="
            echo "server.properties: $([ -f minecraft-data/server.properties ] && echo 'Exists' || echo 'Missing')"
            echo "eula.txt: $([ -f minecraft-data/eula.txt ] && echo 'Exists' || echo 'Missing')"
            echo "ops.json: $([ -f minecraft-data/ops.json ] && echo 'Exists' || echo 'Missing')"
            echo "whitelist.json: $([ -f minecraft-data/whitelist.json ] && echo 'Exists' || echo 'Missing')"
            echo "plugins directory: $([ -d minecraft-data/plugins ] && echo 'Exists' || echo 'Missing')"
            echo "world directory: $([ -d minecraft-data/world ] && echo 'Exists' || echo 'Missing')"
            
            # Create backup every 12 hours
            if [ $(($(date +%s) % 43200)) -lt 30 ]; then
              echo "=== Creating Scheduled Backup ==="
              BACKUP_DIR="minecraft-data/backups/$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$BACKUP_DIR"
              cp minecraft-data/server.properties "$BACKUP_DIR/" 2>/dev/null || true
              cp minecraft-data/ops.json "$BACKUP_DIR/" 2>/dev/null || true
              cp minecraft-data/whitelist.json "$BACKUP_DIR/" 2>/dev/null || true
              if [ -d "minecraft-data/plugins" ]; then
                cp -r minecraft-data/plugins "$BACKUP_DIR/"
              fi
              if [ -d "minecraft-data/world" ]; then
                cp -r minecraft-data/world "$BACKUP_DIR/"
              fi
              echo "Scheduled backup created at: $BACKUP_DIR"
              
              # Keep only last 3 scheduled backups
              cd minecraft-data/backups
              ls -t | tail -n +4 | xargs -r rm -rf
            fi
          fi
          
          sleep 30
          LOOP_COUNTER=$((LOOP_COUNTER + 1))
          
          # Save cache every 100 iterations (about 50 minutes)
          if [ $((LOOP_COUNTER % 100)) -eq 0 ]; then
            echo "Saving progress..."
          fi
        done
        
        echo "Monitoring loop completed after $LOOP_COUNTER iterations"
