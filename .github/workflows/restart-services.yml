name: MC Server Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'restart'
        type: choice
        options:
        - restart
        - status

jobs:
  manage-server:
    runs-on: ubuntu-latest
    timeout-minutes: 9999
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Restore cached data
      uses: actions/cache@v4
      with:
        path: |
          minecraft-data
          craftip-logs
        key: mc-server-${{ github.run_id }}
        restore-keys: |
          mc-server-
          
    - name: Stop existing server
      if: github.event.inputs.action == 'restart'
      run: |
        echo "Stopping existing services..."
        if [ -f minecraft-data/minecraft.pid ]; then
          kill $(cat minecraft-data/minecraft.pid) 2>/dev/null || true
        fi
        if [ -f craftip/craftip.pid ]; then
          kill $(cat craftip/craftip.pid) 2>/dev/null || true
        fi
        sleep 10
        
    - name: Restart services
      if: github.event.inputs.action == 'restart'
      run: |
        echo "Restarting Minecraft server and CraftIP client..."
        
        # Ensure all required directories exist
        mkdir -p minecraft-data/world
        mkdir -p minecraft-data/plugins
        mkdir -p minecraft-data/logs
        mkdir -p minecraft-data/backups
        
        # Ensure essential files exist (preserve existing ones)
        if [ ! -f minecraft-data/server.properties ]; then
          cat > minecraft-data/server.properties << EOF
        motd=GitHub Actions Minecraft Server
        difficulty=normal
        gamemode=survival
        spawn-protection=0
        online-mode=false
        pvp=true
        allow-flight=false
        level-type=default
        generate-structures=true
        max-players=20
        level-name=world
        server-port=25565
        EOF
        fi
        
        if [ ! -f minecraft-data/eula.txt ]; then
          echo "eula=true" > minecraft-data/eula.txt
        fi
        
        if [ ! -f minecraft-data/ops.json ]; then
          echo '[]' > minecraft-data/ops.json
        fi
        
        if [ ! -f minecraft-data/whitelist.json ]; then
          echo '[]' > minecraft-data/whitelist.json
        fi
        
        # Copy plugins from repository
        echo "Copying plugins from repository to server directory..."
        if [ -d "plugins" ]; then
          cp plugins/*.jar minecraft-data/plugins/ 2>/dev/null || echo "No .jar files found in plugins directory"
          echo "Repository plugins copied to server"
          echo "Copied plugins:"
          ls -la minecraft-data/plugins/*.jar 2>/dev/null || echo "No plugins found"
        else
          echo "No plugins directory found in repository"
        fi
        
        # Build CraftIP client
        cd craftip
        cargo build --release --bin client
        
        # Start Minecraft server
        cd ../minecraft-data
        java -Xmx2G -Xms1G -jar server.jar nogui &
        echo $! > minecraft.pid
        sleep 30
        
        # Wait for server to be ready
        for i in {1..60}; do
          if netstat -tlnp | grep :25565 > /dev/null; then
            echo "Minecraft server is ready!"
            break
          fi
          echo "Attempt $i: Server not ready yet..."
          sleep 5
        done
        
        # Start CraftIP client
        cd ../craftip
        ./target/release/client localhost:25565 &
        echo $! > craftip.pid
        
        echo "Services restarted successfully!"
        
    - name: Keep services alive
      if: github.event.inputs.action == 'restart'
      run: |
        echo "Starting monitoring loop..."
        while true; do
          # Check if Minecraft server is still running
          if ! kill -0 $(cat minecraft-data/minecraft.pid 2>/dev/null) 2>/dev/null; then
            echo "Minecraft server died, restarting..."
            cd minecraft-data
            java -Xmx2G -Xms1G -jar server.jar nogui &
            echo $! > minecraft.pid
            sleep 30
          fi
          
          # Check if CraftIP client is still running
          if ! kill -0 $(cat craftip/craftip.pid 2>/dev/null) 2>/dev/null; then
            echo "CraftIP client died, restarting..."
            cd craftip
            ./target/release/client localhost:25565 &
            echo $! > craftip.pid
          fi
          
          # Show status every 10 minutes
          if [ $(($(date +%s) % 600)) -lt 30 ]; then
            echo "=== Status Check ==="
            echo "Minecraft PID: $(cat minecraft-data/minecraft.pid 2>/dev/null || echo 'Not found')"
            echo "CraftIP PID: $(cat craftip/craftip.pid 2>/dev/null || echo 'Not found')"
            netstat -tlnp | grep :25565 || echo "Port 25565 not listening"
          fi
          
          sleep 30
        done
        
    - name: Show status
      if: github.event.inputs.action == 'status'
      run: |
        echo "=== Minecraft Server Status ==="
        if [ -f minecraft-data/minecraft.pid ]; then
          PID=$(cat minecraft-data/minecraft.pid 2>/dev/null)
          if kill -0 $PID 2>/dev/null; then
            echo "Minecraft server is running (PID: $PID)"
          else
            echo "Minecraft server is not running"
          fi
        else
          echo "Minecraft server PID file not found"
        fi
        
        echo ""
        echo "=== CraftIP Client Status ==="
        if [ -f craftip/craftip.pid ]; then
          PID=$(cat craftip/craftip.pid 2>/dev/null)
          if kill -0 $PID 2>/dev/null; then
            echo "CraftIP client is running (PID: $PID)"
          else
            echo "CraftIP client is not running"
          fi
        else
          echo "CraftIP client PID file not found"
        fi
        
        echo ""
        echo "=== Port Status ==="
        netstat -tlnp | grep :25565 || echo "Port 25565 is not listening"
        
        echo ""
        echo "=== Server Files Status ==="
        echo "server.properties: $([ -f minecraft-data/server.properties ] && echo 'Exists' || echo 'Missing')"
        echo "eula.txt: $([ -f minecraft-data/eula.txt ] && echo 'Exists' || echo 'Missing')"
        echo "ops.json: $([ -f minecraft-data/ops.json ] && echo 'Exists' || echo 'Missing')"
        echo "whitelist.json: $([ -f minecraft-data/whitelist.json ] && echo 'Exists' || echo 'Missing')"
        echo "plugins directory: $([ -d minecraft-data/plugins ] && echo 'Exists' || echo 'Missing')"
        echo "world directory: $([ -d minecraft-data/world ] && echo 'Exists' || echo 'Missing')"
        echo "backups directory: $([ -d minecraft-data/backups ] && ls minecraft-data/backups | wc -l) backups"
        
        echo ""
        echo "=== Recent Logs ==="
        if [ -f minecraft-data/logs/latest.log ]; then
          echo "Last 10 lines of Minecraft log:"
          tail -10 minecraft-data/logs/latest.log
        fi
