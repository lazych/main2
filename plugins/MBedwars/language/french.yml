setupgui_create_type_region:
- Région
- Restreignez l'arène avec une bordure.
- Les joueurs verront un effet visuel de la bordure et ne pourront pas la quitter.
- Ainsi, vous pouvez également créer plusieurs arènes dans un même monde.
- Veuillez consulter le wiki pour plus d'informations.
setupgui_create_type_world:
- Monde
- Il n'y a pas de frontière et utilise le monde entier pour le jeu.
- Plus facile à installer mais peut être plus lourd lors de la régénération.
- Veuillez consulter le wiki pour plus d'informations.
setupgui_create_type_voting:
- Voter
- Ce n'est pas une véritable arène dans laquelle vous jouez.
- Au lieu de cela, utilise son lobby uniquement pour voter.
- Les joueurs seront téléportés vers des arènes de type Monde ou Région une fois le
  vote terminé.
- Veuillez consulter le wiki pour plus d'informations.
