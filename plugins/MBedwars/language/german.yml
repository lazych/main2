- Beschränke die Arena mithilfe einer Grenze.
- Spieler werden ein visuelles Effekt von der Grenze sehen und sind nicht in der Lage,
  diese zu verlassen.
- Dadurch kannst du auch mehrere Arenen dieses Types in einer Welt erstellen.
- Bitte besuche die Wiki für detaillierte Informationen.
setupgui_create_type_world:
- Welt
- Es gibt keine Grenze und verwendet die komplette Welt für das Spiel.
- Einfacher zum Erstellen, jedoch langsamer beim Regenerieren.
- Bitte besuche die Wiki für detaillierte Informationen.
setupgui_create_type_voting:
- Abstimmung
- Keine tatsächliche Arena, in der gespielt wird.
- Nutzt stattdessen nur dessen Lobby für die Abstimmung.
- Spieler werden nach der Abstimmung in eine Arena des Types "Fläche" oder "Welt"
  gemoved.
- Bitte besuche die Wiki für detaillierte Informationen.
