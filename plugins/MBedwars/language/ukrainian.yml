- Голосування
- Це не поточна арена, на якій можна грати.
- Замість цього вона використовує лише лоббі для голосування.
- Гравці будуть телепортовані на арени типу World чи Region після закінчення голосування.
- Будь ласка, відвідайте вікі для отримання більш детальної інформації.
